apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: egress-gateway
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: egress
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            kubernetes.io/metadata.name: default
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: allow-httpbin
  namespace: default
spec:
  parentRefs:
  - name: egress-gateway
    namespace: {{ .Release.Namespace }}

  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: httpbin1-svc
      namespace: default
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: deny-icanhazip
  namespace: default
spec:
  parentRefs:
  - name: egress-gateway
    namespace: {{ .Release.Namespace }}
  hostnames:
  - "icanhazip.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    # Intentionally leaving backendRefs empty to imply rejection if supported,
    # or directing to a dummy service in practice.
